name: preload_google_ads  # The name of your plugin as it'll appear on pub.dev
description: "Instant AdMob ads for Flutter (all formats)."
version: 1.0.5  # Semantic versioning — update this with each release
homepage: https://github.com/bhx20/Preload-Google-Ads
repository: https://github.com/bhx20/Preload-Google-Ads
issue_tracker: https://github.com/bhx20/Preload-Google-Ads/issues

topics:
  - ads
  - monetization
  - admob
  - google-ads
  - preload

environment:
  sdk: ">=3.6.0 <4.0.0"       # Specifies Dart SDK compatibility
  flutter: ">=3.3.0"          # Minimum Flutter SDK version required

dependencies:
  flutter:
    sdk: flutter              # Core Flutter dependency
  google_mobile_ads: ^7.0.0   # Google Mobile Ads SDK for Flutter (official package)

dev_dependencies:
  flutter_test:
    sdk: flutter              # Used for writing tests
  flutter_lints: ^6.0.0       # Enforces recommended linting rules for clean code

flutter:
  plugin:
    platforms:
      android:
        package: com.plug.preload
        pluginClass: PreloadGoogleAdsPlugin
      ios:
        pluginClass: PreloadGoogleAdsPlugin
